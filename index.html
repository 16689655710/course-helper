<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>网课代刷平台</title>
<style>
  :root {
    --bg: #0f0f1a; --card: #1a1a2e; --accent: #6c63ff; --accent2: #ff6584;
    --text: #e0e0e0; --sub: #999; --gold: #ffb800; --green: #4ade80; --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex; justify-content: center; padding: 16px;
  }
  .app { width: 100%; max-width: 460px; min-height: 100vh; }
  .page { display: none; }
  .page.active { display: block; }

  .header { text-align: center; padding: 18px 14px; }
  .header .icon { width: 46px; height: 46px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 12px; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .header h1 { font-size: 17px; font-weight: 700; }
  .header p { font-size: 11px; color: var(--sub); margin-top: 2px; }

  .search { background: var(--card); border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .search input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 13px; }
  .search input::placeholder { color: var(--sub); }

  .cats { display: flex; gap: 5px; margin-bottom: 12px; overflow-x: auto; }
  .cat { padding: 5px 10px; border-radius: 14px; font-size: 11px; white-space: nowrap; background: var(--card); color: var(--sub); cursor: pointer; border: none; font-family: inherit; }
  .cat.active { background: var(--accent); color: #fff; }

  .course-grid { display: flex; flex-direction: column; gap: 8px; padding-bottom: 80px; }
  .course-card {
    background: var(--card); border-radius: 12px; padding: 12px 14px; cursor: pointer;
    transition: .15s; text-decoration: none; color: inherit; display: flex;
    align-items: flex-start; gap: 10px;
  }
  .course-card:active { transform: scale(0.98); background: #252545; }
  .course-card .logo { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .course-card .info { flex: 1; min-width: 0; }
  .course-card .name { font-size: 13px; font-weight: 600; }
  .course-card .desc { font-size: 10px; color: var(--sub); margin-top: 2px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .course-card .right { text-align: right; flex-shrink: 0; }
  .course-card .price { font-size: 17px; font-weight: 800; color: var(--gold); }
  .course-card .price .u { font-size: 10px; font-weight: 400; }
  .course-card .tag { font-size: 9px; padding: 1px 5px; border-radius: 3px; display: inline-block; margin-top: 2px; }
  .tag.hot { background: rgba(245,158,11,.15); color: #f59e0b; }
  .tag.fast { background: rgba(74,222,128,.12); color: var(--green); }
  .tag.rec { background: rgba(108,99,255,.15); color: var(--accent); }
  .arrow { color: var(--sub); font-size: 15px; align-self: center; }

  .back { color: var(--accent); font-size: 13px; cursor: pointer; text-decoration: none; display: inline-block; margin-bottom: 10px; }
  .order-card { background: var(--card); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
  .order-card h3 { font-size: 15px; }

  .form-group { margin-bottom: 10px; }
  .form-group label { display: block; font-size: 12px; color: var(--sub); margin-bottom: 4px; }
  .form-group input, .form-group textarea {
    width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #2a2a40;
    background: var(--card); color: var(--text); font-size: 14px; outline: none;
    font-family: inherit; resize: vertical;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }

  .course-checklist { max-height: 350px; overflow-y: auto; margin-bottom: 10px; }
  .check-item {
    display: flex; align-items: flex-start; gap: 8px; padding: 10px 12px;
    background: var(--card); border-radius: 8px; margin-bottom: 6px;
    cursor: pointer; border: 2px solid transparent;
  }
  .check-item.checked { border-color: var(--accent); background: #1e1e3a; }
  .check-item input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); margin-top: 2px; flex-shrink: 0; }
  .check-item .ci { flex: 1; }
  .check-item .cn { font-size: 13px; font-weight: 600; }
  .check-item .cd { font-size: 10px; color: var(--sub); }

  .qr-section { text-align: center; margin: 12px 0; }
  .qr-section img { width: 160px; height: 160px; border-radius: 12px; border: 2px dashed #333; }

  .btn {
    width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 14px;
    font-weight: 600; cursor: pointer; color: #fff; font-family: inherit;
  }
  .btn-primary { background: var(--accent); }
  .btn-gold { background: linear-gradient(135deg, #f59e0b, #e67e00); }
  .btn-green { background: var(--green); color: #000; }
  .btn-red { background: var(--red); }
  .btn-outline { background: none; border: 1px solid var(--accent); color: var(--accent); }
  .btn-sm { padding: 6px 12px; font-size: 11px; width: auto; }

  .order-item { background: var(--card); border-radius: 10px; padding: 10px; margin-bottom: 6px; font-size: 12px; }
  .order-item .meta { color: var(--sub); font-size: 10px; margin-top: 3px; }
  .status { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 9px; margin-left: 4px; }
  .status.pending { background: rgba(245,158,11,.2); color: #f59e0b; }
  .status.done { background: rgba(74,222,128,.2); color: var(--green); }
  .inline-row { display: flex; gap: 6px; align-items: center; }
  .inline-row input { flex: 1; }

  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 460px;
    background: var(--card); border-top: 1px solid #222;
    display: flex; justify-content: space-around; padding: 8px 0 12px; z-index: 100;
  }
  .bottom-nav .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    font-size: 9px; color: var(--sub); cursor: pointer; background: none; border: none; font-family: inherit;
  }
  .bottom-nav .nav-item .nav-icon { font-size: 17px; }

  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 8px 20px; border-radius: 16px;
    font-size: 12px; z-index: 999; opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  .toast.show { opacity: 1; }
  .footer { text-align: center; padding: 14px 14px 80px; color: var(--sub); font-size: 10px; }
  .notice { background: rgba(255,184,0,.05); border-left: 3px solid var(--gold); border-radius: 8px; padding: 8px 10px; margin: 8px 0; font-size: 11px; color: var(--gold); }
  .err-msg { background: rgba(239,68,68,.08); border-radius: 8px; padding: 8px 10px; margin: 8px 0; font-size: 11px; color: var(--red); }
  .loading { text-align: center; padding: 20px; color: var(--sub); }
  .loading .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }
</style>

// ═══════════════════════════════════════════
function loadData(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}; }catch(e){ return{}; } }
function saveData(d){ localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function getCourses(){ const d=loadData(); return d.prices||DEFAULT_COURSES; }
function getOrders(){ const d=loadData(); return d.orders||[]; }
function getUserQR(){ const d=loadData(); return d.paymentQR||""; }

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
let activeCat="all", adminTab="orders", selectedCheckItems={}, checkedCourseData=null;

function showPage(name, data){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  const pg=document.getElementById("page-"+name);
  if(pg) pg.classList.add("active");
  window._pageData=data;
  if(name==="home") renderCourses();
  if(name==="order") renderOrder();
  if(name==="orders") renderMyOrders();
  if(name==="admin") renderAdmin();
  window.scrollTo(0,0);
}

// ═══════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════
function renderCourses(){
  const courses=getCourses();
  const kw=(document.getElementById("searchInput")?.value||"").toLowerCase();
  let list=courses;
  if(activeCat!=="all") list=list.filter(c=>c.cat===activeCat);
  if(kw) list=list.filter(c=>c.name.toLowerCase().includes(kw)||c.desc.toLowerCase().includes(kw)||c.platform.toLowerCase().includes(kw));
  document.getElementById("courseGrid").innerHTML=list.map(c=>`
    <a class="course-card" href="javascript:void(0)" onclick="showPage('order',${JSON.stringify(c).replace(/"/g,'&quot;').replace(/'/g,'&#39;')})">
      <div class="logo" style="background:${c.bg}">${c.logo}</div>
      <div class="info">
        <div class="name">${c.name} ${c.tag?'<span class="tag '+c.tag+'">'+c.tagText+'</span>':''}</div>
        <div class="desc">${c.desc}</div>
      </div>
      <div class="right"><div class="price"><span class="u">¥</span>${c.price.toFixed(1)}</div></div>
      <span class="arrow">›</span>
    </a>
  `).join("");
}

function filterCat(cat,btn){
  activeCat=cat;
  document.querySelectorAll("#catBar .cat").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderCourses();
}

// ═══════════════════════════════════════════
// ORDER PAGE
// ═══════════════════════════════════════════
function renderOrder(){
  const c=window._pageData;
  if(!c) return;
  document.getElementById("orderCourseInfo").innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:40px;height:40px;border-radius:10px;background:${c.bg};display:flex;align-items:center;justify-content:center;font-size:18px;">${c.logo}</div>
      <div><h3>${c.name}</h3><p style="color:var(--sub);font-size:11px;">${c.platform}平台 · ¥${c.price.toFixed(1)}/项</p></div>
    </div>
  `;
  document.getElementById("orderSchool").value="";
  document.getElementById("orderAccount").value="";
  document.getElementById("orderPassword").value="";
  document.getElementById("checkResultArea").classList.add("hidden");
  document.getElementById("checkLoading").classList.add("hidden");
  document.getElementById("checkResultArea").innerHTML="";
  document.getElementById("courseChecklistWrap").classList.add("hidden");
  document.getElementById("courseChecklistWrap").innerHTML="";
  document.getElementById("paySection").classList.add("hidden");
  document.getElementById("btnCheckCourse").classList.remove("hidden");
  selectedCheckItems={};
  checkedCourseData=null;
  const qr=getUserQR();
  const qi=document.getElementById("paymentQR");
  if(qr){qi.src=qr;qi.style.display="";}else{qi.style.display="none";}
}

// ═══════════════════════════════════════════
// CHECK COURSE — 查课
// ═══════════════════════════════════════════
async function checkCourse(){
  const c=window._pageData;
  if(!c) return;
  const school=document.getElementById("orderSchool").value.trim();
  const account=document.getElementById("orderAccount").value.trim();
  const password=document.getElementById("orderPassword").value.trim();
  if(!school||!account||!password){ toast("请填写学校、账号和密码"); return; }

  const btn=document.getElementById("btnCheckCourse");
  btn.classList.add("hidden");
  document.getElementById("checkResultArea").classList.add("hidden");
  document.getElementById("checkLoading").classList.remove("hidden");
  document.getElementById("courseChecklistWrap").classList.add("hidden");
  document.getElementById("paySection").classList.add("hidden");

  try {
    // Call proxy → kx API via CORS proxy
    const resp=await fetch(PROXY_URL+"/api/proxy",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        endpoint:"/api/v2/checkcourses/get",
        data:{cid:parseInt(c.cid)||6721, school, account:account, pass:password}
      })
    });
    const result=await resp.json();
    document.getElementById("checkLoading").classList.add("hidden");

    if(result.code===1 && result.data){
      // Success: show course list
      checkedCourseData=result.data;
      renderCheckedCourses(result.data, c);
    } else {
      // Show error
      let errMsg=result.msg||"查询失败，请检查账号密码是否正确";
      document.getElementById("checkResultArea").classList.remove("hidden");
      document.getElementById("checkResultArea").innerHTML=`
        <div class="err-msg">❌ ${errMsg}</div>
        <p style="font-size:11px;color:var(--sub);">请检查账号密码后重试，或联系客服</p>
      `;
      btn.classList.remove("hidden");
    }
  } catch(e){
    document.getElementById("checkLoading").classList.add("hidden");
    // Fallback: show manual course selection
    document.getElementById("checkResultArea").classList.remove("hidden");
    document.getElementById("checkResultArea").innerHTML=`
      <div class="notice">⚠️ 自动查课暂时不可用（${e.message}），请手动选择课程</div>
    `;
    showManualCourseSelect(c);
  }
}

function renderCheckedCourses(courseData, scriptInfo){
  document.getElementById("courseChecklistWrap").classList.remove("hidden");
  document.getElementById("courseChecklistWrap").innerHTML=`
    <div class="order-card"><h3>📋 查询结果</h3><p style="color:var(--sub);font-size:11px;">以下是从平台查询到的课程，请勾选需要代刷的课程</p></div>
    <div style="margin-bottom:8px;display:flex;gap:6px;">
      <button class="btn btn-sm btn-outline" onclick="selectAll()">全选</button>
      <button class="btn btn-sm btn-outline" onclick="deselectAll()">取消</button>
    </div>
    <div class="course-checklist" id="courseChecklist"></div>
  `;
  const list=document.getElementById("courseChecklist");
  if(Array.isArray(courseData)){
    courseData.forEach((item,i)=>{
      const name=item.name||item.title||item.course_name||("课程"+(i+1));
      const desc=item.desc||item.info||"";
      list.innerHTML+=`
        <div class="check-item" id="checkitem_${i}" onclick="toggleCheck(${i})">
          <input type="checkbox" id="check_${i}" onchange="toggleCheck(${i})">
          <div class="ci"><div class="cn">${name}</div>${desc?`<div class="cd">${desc}</div>`:""}</div>
        </div>
      `;
    });
  }
  document.getElementById("paySection").classList.remove("hidden");
  updateTotal();
}

function showManualCourseSelect(c){
  // When API fails, show the script's default checkItems
  document.getElementById("courseChecklistWrap").classList.remove("hidden");
  const items=c.checkItems||[c.platform+"全包"];
  document.getElementById("courseChecklistWrap").innerHTML=`
    <div class="order-card"><h3>📋 手动选择课程</h3><p style="color:var(--sub);font-size:11px;">请根据你的平台账号，勾选需要代刷的项目</p></div>
    <div style="margin-bottom:8px;display:flex;gap:6px;">
      <button class="btn btn-sm btn-outline" onclick="selectAll()">全选</button>
      <button class="btn btn-sm btn-outline" onclick="deselectAll()">取消</button>
    </div>
    <div class="course-checklist" id="courseChecklist"></div>
  `;
  const list=document.getElementById("courseChecklist");
  items.forEach((item,i)=>{
    list.innerHTML+=`
      <div class="check-item" id="checkitem_${i}" onclick="toggleCheck(${i})">
        <input type="checkbox" id="check_${i}" onchange="toggleCheck(${i})">
        <div class="ci"><div class="cn">${item}</div><div class="cd">${c.platform}平台 · ¥${c.price.toFixed(1)}</div></div>
      </div>
    `;
  });
  document.getElementById("paySection").classList.remove("hidden");
  updateTotal();
}

function toggleCheck(i){
  const cb=document.getElementById("check_"+i);
  cb.checked=!cb.checked;
  const el=document.getElementById("checkitem_"+i);
  if(cb.checked){el.classList.add("checked");selectedCheckItems[i]=true;}
  else{el.classList.remove("checked");delete selectedCheckItems[i];}
  updateTotal();
}

function selectAll(){
  const items=document.querySelectorAll("#courseChecklist .check-item");
  items.forEach((el,i)=>{selectedCheckItems[i]=true;el.classList.add("checked");const cb=document.getElementById("check_"+i);if(cb)cb.checked=true;});
  updateTotal();
}

function deselectAll(){
  const items=document.querySelectorAll("#courseChecklist .check-item");
  items.forEach((el,i)=>{delete selectedCheckItems[i];el.classList.remove("checked");const cb=document.getElementById("check_"+i);if(cb)cb.checked=false;});
  updateTotal();
}

function updateTotal(){
  const c=window._pageData;
  if(!c) return;
  const count=Object.keys(selectedCheckItems).length||1;
  const basePrice=c.price;
  const total=count*basePrice*PRICE_MULTIPLIER;
  document.getElementById("orderTotalPrice").textContent="¥"+total.toFixed(1)+"（"+count+"项 × ¥"+(basePrice*PRICE_MULTIPLIER).toFixed(1)+"）";
}

// ═══════════════════════════════════════════
// SUBMIT ORDER
// ═══════════════════════════════════════════
function submitFullOrder(){
  const c=window._pageData;
  if(!c) return;
  if(Object.keys(selectedCheckItems).length===0){toast("请至少选择一项");return;}

  let selectedNames=[];
  const checkItems=document.querySelectorAll("#courseChecklist .check-item");
  checkItems.forEach(el=>{const cn=el.querySelector(".cn");if(cn)selectedNames.push(cn.textContent);});

  const count=Object.keys(selectedCheckItems).length;
  const total=count*c.price*PRICE_MULTIPLIER;
  const screenshotFile=document.getElementById("orderScreenshot").files[0];

  const order={
    id:Date.now().toString(36),
    course:c.name,platform:c.platform,price:c.price,multiplier:PRICE_MULTIPLIER,
    count,total,
    school:document.getElementById("orderSchool").value.trim(),
    account:document.getElementById("orderAccount").value.trim(),
    password:document.getElementById("orderPassword").value.trim(),
    selectedCourses:selectedNames,
    status:"pending",
    createdAt:new Date().toLocaleString(),
  };

  const data=loadData();
  const orders=data.orders||[];

  function finalize(od){
    orders.unshift(od);data.orders=orders;saveData(data);
    const info=`【新订单】${od.course}\n学校:${od.school}\n账号:${od.account}\n密码:${od.password}\n课程:${od.selectedCourses.join('、')}\n数量:${od.count}项·金额:¥${od.total.toFixed(1)}`;
    copyToClipboard(info);
    toast("订单提交成功！信息已复制");
    setTimeout(()=>showPage("home"),2000);
  }

  if(screenshotFile){
    const reader=new FileReader();
    reader.onload=function(e){order.screenshot=e.target.result;finalize(order);};
    reader.readAsDataURL(screenshotFile);
  }else{finalize(order);}
}

// ═══════════════════════════════════════════
// MY ORDERS
// ═══════════════════════════════════════════
function renderMyOrders(){
  const orders=getOrders();
  const div=document.getElementById("myOrdersList");
  if(orders.length===0){div.innerHTML='<p style="color:var(--sub);text-align:center;padding:30px;">暂无订单</p>';return;}
  div.innerHTML=orders.slice(0,30).map(o=>`
    <div class="order-item">
      <div><b>${o.course}</b> <span class="status ${o.status}">${o.status==="pending"?"处理中":"已完成"}</span></div>
      <div style="font-size:11px;">${o.school} | ${o.account} | ${o.count||1}项 ¥${(o.total||o.price).toFixed(1)}</div>
      ${o.selectedCourses?'<div style="font-size:10px;color:var(--sub);">'+o.selectedCourses.join('、')+'</div>':''}
      <div class="meta">${o.createdAt}</div>
    </div>
  `).join("");
}

// ═══════════════════════════════════════════
// ADMIN
// ═══════════════════════════════════════════
function adminLogin(){
  if(document.getElementById("adminPassword").value===ADMIN_PWD){showPage("admin");toast("登录成功");}
  else{toast("密码错误");}
}

function renderAdmin(){
  const div=document.getElementById("adminContent");
  const data=loadData();
  if(adminTab==="orders"){
    const orders=getOrders();
    if(orders.length===0){div.innerHTML='<p style="color:var(--sub);text-align:center;padding:30px;">暂无订单</p>';}
    else{
      div.innerHTML=orders.map(o=>`
        <div class="order-item">
          <div><b>${o.course}</b> - ¥${(o.total||o.price).toFixed(1)} <span class="status ${o.status}">${o.status==="pending"?"处理中":"已完成"}</span></div>
          <div style="margin-top:2px;font-size:11px;">平台:${o.platform||'--'}｜学校:${o.school}｜账号:${o.account}｜密码:${o.password}</div>
          ${o.selectedCourses?'<div style="font-size:11px;color:var(--green);">课程:'+o.selectedCourses.join('、')+'</div>':''}
          <div class="meta">${o.createdAt}｜${o.count||1}项</div>
          ${o.screenshot?`<img src="${o.screenshot}" style="max-width:80px;margin-top:3px;border-radius:6px;">`:""}
          <div style="margin-top:4px;display:flex;gap:4px;">
            <button class="btn btn-sm btn-green" onclick="kxOpen('${o.id}')">跳kx下单</button>
            ${o.status==="pending"?`<button class="btn btn-sm btn-primary" onclick="markDone('${o.id}')">完成</button>`:""}
          </div>
        </div>
      `).join("");
    }
  }
  if(adminTab==="prices"){
    const courses=getCourses();
    div.innerHTML=courses.map((c,i)=>`
      <div class="order-item">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:11px;"><b>${c.logo} ${c.name}</b></span>
          <div class="inline-row">
            <span style="font-size:10px;color:var(--sub);">¥</span>
            <input type="number" id="price_${i}" value="${c.price}" style="width:60px;padding:5px;border-radius:6px;border:1px solid #444;background:var(--card);color:var(--text);text-align:center;" step="0.1">
            <button class="btn btn-sm btn-green" onclick="updatePrice(${i})">保存</button>
          </div>
        </div>
      </div>
    `).join("")+'<p style="color:var(--sub);font-size:10px;margin-top:4px;">当前倍率：${PRICE_MULTIPLIER}x，客户支付价 = 单价 × ${PRICE_MULTIPLIER}</p>';
  }
  if(adminTab==="qrcode"){
    const qr=getUserQR();
    div.innerHTML=`
      <p style="font-size:12px;color:var(--sub);margin-bottom:6px;">上传收款码</p>
      ${qr?`<img src="${qr}" style="max-width:160px;border-radius:10px;margin-bottom:6px;display:block;">`:"<p style='color:var(--sub);'>未设置</p>"}
      <input type="file" id="qrcodeFile" accept="image/*" style="margin-bottom:6px;">
      <button class="btn btn-primary" onclick="uploadQR()">上传</button>
    `;
  }
}

function markDone(id){
  const data=loadData();const orders=data.orders||[];
  const o=orders.find(x=>x.id===id);
  if(o){o.status="done";data.orders=orders;saveData(data);renderAdmin();toast("已标记");}
}

function updatePrice(i){
  const val=parseFloat(document.getElementById("price_"+i).value);
  if(isNaN(val)||val<0){toast("无效");return;}
  const data=loadData();
  if(!data.prices)data.prices=[...DEFAULT_COURSES];
  data.prices[i].price=val;saveData(data);toast("已更新");
}

function uploadQR(){
  const file=document.getElementById("qrcodeFile").files[0];
  if(!file){toast("请选择");return;}
  const reader=new FileReader();
  reader.onload=function(e){const data=loadData();data.paymentQR=e.target.result;saveData(data);toast("已更新");renderAdmin();};
  reader.readAsDataURL(file);
}

function kxOpen(orderId){
  const data=loadData();const orders=data.orders||[];
  const o=orders.find(x=>x.id===orderId);
  if(!o) return;
  const info=`学校:${o.school}\n账号:${o.account}\n密码:${o.password}\n课程:${(o.selectedCourses||['全包']).join('、')}`;
  copyToClipboard(info);
  window.open("https://kx.nopoliceman.help/add2","_blank");
  toast("已复制信息，在kx粘贴使用");
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>t.classList.remove("show"),2500);
}

function copyToClipboard(text){
  try{const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.left="-9999px";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);}catch(e){}
}

renderCourses();
</script>
</body>
