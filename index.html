<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>网课代刷平台</title>
<style>
  :root {
    --bg: #0f0f1a; --card: #1a1a2e; --accent: #6c63ff; --accent2: #ff6584;
    --text: #e0e0e0; --sub: #999; --gold: #ffb800; --green: #4ade80; --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex; justify-content: center; padding: 16px;
  }
  .app { width: 100%; max-width: 460px; min-height: 100vh; }
  .page { display: none; }
  .page.active { display: block; }

  .header { text-align: center; padding: 20px 16px; }
  .header .icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 14px; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header p { font-size: 11px; color: var(--sub); margin-top: 3px; }

  .search { background: var(--card); border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .search input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 14px; }
  .search input::placeholder { color: var(--sub); }

  .cats { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; }
  .cat { padding: 6px 12px; border-radius: 16px; font-size: 11px; white-space: nowrap; background: var(--card); color: var(--sub); cursor: pointer; border: none; font-family: inherit; }
  .cat.active { background: var(--accent); color: #fff; }

  .course-grid { display: flex; flex-direction: column; gap: 8px; padding-bottom: 80px; }
  .course-card {
    background: var(--card); border-radius: 12px; padding: 14px; cursor: pointer;
    transition: .15s; text-decoration: none; color: inherit; display: flex;
    align-items: flex-start; gap: 10px;
  }
  .course-card:active { transform: scale(0.98); background: #252545; }
  .course-card .logo { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .course-card .info { flex: 1; min-width: 0; }
  .course-card .name { font-size: 14px; font-weight: 600; }
  .course-card .desc { font-size: 11px; color: var(--sub); margin-top: 2px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .course-card .right { text-align: right; flex-shrink: 0; }
  .course-card .price { font-size: 18px; font-weight: 800; color: var(--gold); }
  .course-card .price .u { font-size: 11px; font-weight: 400; }
  .course-card .tag { font-size: 9px; padding: 1px 6px; border-radius: 4px; display: inline-block; margin-top: 2px; }
  .tag.hot { background: rgba(245,158,11,.15); color: #f59e0b; }
  .tag.fast { background: rgba(74,222,128,.12); color: var(--green); }
  .tag.rec { background: rgba(108,99,255,.15); color: var(--accent); }
  .arrow { color: var(--sub); font-size: 16px; align-self: center; }

  .back { color: var(--accent); font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; margin-bottom: 10px; }
  .order-card { background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .order-card h3 { font-size: 16px; margin-bottom: 4px; }
  .order-card .price-big { font-size: 26px; font-weight: 800; color: var(--gold); }

  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: var(--sub); margin-bottom: 5px; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 11px 12px; border-radius: 10px; border: 1px solid #2a2a40;
    background: var(--card); color: var(--text); font-size: 14px; outline: none;
    font-family: inherit; resize: vertical;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }

  .course-checklist { max-height: 400px; overflow-y: auto; margin-bottom: 12px; }
  .check-item {
    display: flex; align-items: flex-start; gap: 10px; padding: 12px;
    background: var(--card); border-radius: 10px; margin-bottom: 8px;
    cursor: pointer; border: 2px solid transparent; transition: .15s;
  }
  .check-item.checked { border-color: var(--accent); background: #1e1e3a; }
  .check-item input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--accent); margin-top: 2px; flex-shrink: 0; }
  .check-item .ci { flex: 1; }
  .check-item .cn { font-size: 13px; font-weight: 600; }
  .check-item .cd { font-size: 11px; color: var(--sub); margin-top: 2px; }

  .qr-section { text-align: center; margin: 14px 0; }
  .qr-section img { width: 180px; height: 180px; border-radius: 12px; border: 2px dashed #333; }

  .btn {
    width: 100%; padding: 14px; border-radius: 10px; border: none; font-size: 15px;
    font-weight: 600; cursor: pointer; color: #fff; font-family: inherit;
  }
  .btn-primary { background: var(--accent); }
  .btn-gold { background: linear-gradient(135deg, #f59e0b, #e67e00); }
  .btn-green { background: var(--green); color: #000; }
  .btn-red { background: var(--red); }
  .btn-outline { background: none; border: 1px solid var(--accent); color: var(--accent); }
  .btn-sm { padding: 8px 14px; font-size: 12px; width: auto; }

  .order-item { background: var(--card); border-radius: 10px; padding: 12px; margin-bottom: 8px; font-size: 13px; }
  .order-item .meta { color: var(--sub); font-size: 11px; margin-top: 4px; }
  .status { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; margin-left: 4px; }
  .status.pending { background: rgba(245,158,11,.2); color: #f59e0b; }
  .status.done { background: rgba(74,222,128,.2); color: var(--green); }
  .inline-row { display: flex; gap: 6px; align-items: center; }
  .inline-row input { flex: 1; }

  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 460px;
    background: var(--card); border-top: 1px solid #222;
    display: flex; justify-content: space-around; padding: 8px 0 12px; z-index: 100;
  }
  .bottom-nav .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    font-size: 10px; color: var(--sub); cursor: pointer; background: none; border: none; font-family: inherit;
  }
  .bottom-nav .nav-item .nav-icon { font-size: 18px; }

  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 10px 24px; border-radius: 20px;
    font-size: 13px; z-index: 999; opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  .toast.show { opacity: 1; }
  .footer { text-align: center; padding: 16px 16px 80px; color: var(--sub); font-size: 10px; }
  .notice { background: rgba(255,184,0,.06); border-left: 3px solid var(--gold); border-radius: 8px; padding: 10px 12px; margin: 10px 0; font-size: 11px; color: var(--gold); }
  .hidden { display: none !important; }

  .link-btn { color: var(--accent); text-decoration: underline; cursor: pointer; font-size: 12px; }
  pre { background: #111; border-radius: 8px; padding: 10px; font-size: 11px; overflow-x: auto; margin: 8px 0; white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body>

<div class="app">

  <!-- ==================== HOME ==================== -->
  <div class="page active" id="page-home">
    <div class="header">
      <div class="icon">📚</div>
      <h1>网课代刷平台</h1>
      <p>选脚本 → 填信息 → 选课程 → 支付 → 等待完成</p>
    </div>
    <div class="search">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="搜索平台或脚本..." oninput="renderCourses()">
    </div>
    <div class="cats" id="catBar">
      <button class="cat active" onclick="filterCat('all', this)">全部</button>
      <button class="cat" onclick="filterCat('xxxt', this)">学习通/超星</button>
      <button class="cat" onclick="filterCat('zhs', this)">智慧树/知到</button>
      <button class="cat" onclick="filterCat('uxy', this)">U校园</button>
      <button class="cat" onclick="filterCat('imooc', this)">MOOC/国开</button>
      <button class="cat" onclick="filterCat('english', this)">英语类</button>
      <button class="cat" onclick="filterCat('other', this)">其他平台</button>
    </div>
    <div class="course-grid" id="courseGrid"></div>
    <div class="footer">
      安全可靠 · 不满意退款<br>
      <a href="#" onclick="showPage('admin-login')" style="color:#222;font-size:9px;">管理入口</a>
    </div>
    <div class="bottom-nav">
      <button class="nav-item" onclick="showPage('home')"><span class="nav-icon">🏠</span>首页</button>
      <button class="nav-item" onclick="showPage('orders')"><span class="nav-icon">📋</span>订单</button>
      <button class="nav-item" onclick="showPage('admin-login')"><span class="nav-icon">⚙️</span>管理</button>
    </div>
  </div>

  <!-- ==================== ORDER STEP 1: INFO ==================== -->
  <div class="page" id="page-order">
    <a class="back" href="#" onclick="showPage('home')">← 返回</a>
    <div class="order-card" id="orderCourseInfo"></div>

    <div class="form-group">
      <label>学校/机构名称（必填）</label>
      <input type="text" id="orderSchool" placeholder="如：XX大学 · 用于自动分配同地区IP">
    </div>
    <div class="form-group">
      <label>平台账号（必填）</label>
      <input type="text" id="orderAccount" placeholder="手机号/学号">
    </div>
    <div class="form-group">
      <label>平台密码（必填）</label>
      <input type="password" id="orderPassword" placeholder="登录密码">
    </div>

    <div class="notice" style="font-size:13px;">
      <b>下一步：</b>填写账号密码后，点击下方按钮进入<b>「查课选课」</b>界面，选择你需要代刷的具体课程。
    </div>

    <button class="btn btn-primary" onclick="goToCourseSelect()">下一步：查课选课 →</button>
  </div>

  <!-- ==================== ORDER STEP 2: SELECT COURSES ==================== -->
  <div class="page" id="page-course-select">
    <a class="back" href="#" onclick="showPage('order', window._pageData)">← 上一步</a>
    <div class="order-card">
      <h3>📋 选择需要代刷的课程</h3>
      <p style="color:var(--sub);font-size:12px;margin-top:4px;">
        请根据你的平台账号实际课程，<b>勾选</b>需要代刷的项目。不确定的话全选即可。
      </p>
    </div>

    <div style="margin-bottom:10px;display:flex;gap:8px;">
      <button class="btn btn-sm btn-outline" onclick="selectAll()">全选</button>
      <button class="btn btn-sm btn-outline" onclick="deselectAll()">取消全选</button>
    </div>

    <div class="course-checklist" id="courseChecklist"></div>

    <div class="qr-section">
      <p style="color:var(--red);margin-bottom:6px;">支付完成后提交</p>
      <img id="paymentQR" src="" alt="收款码" onerror="this.style.display='none'" style="width:160px;height:160px;">
      <p>总价：<b id="orderTotalPrice" style="color:var(--gold);font-size:18px;"></b></p>
    </div>
    <div class="form-group">
      <label>支付截图</label>
      <input type="file" id="orderScreenshot" accept="image/*" style="padding:8px;">
    </div>
    <div class="notice">
      提交后工作人员将在 kx 平台为您下单，24h内完成处理。
    </div>
    <button class="btn btn-gold" onclick="submitFullOrder()">提交订单</button>
  </div>

  <!-- ==================== MY ORDERS ==================== -->
  <div class="page" id="page-orders">
    <a class="back" href="#" onclick="showPage('home')">← 返回</a>
    <div class="order-card"><h3>我的订单</h3></div>
    <div id="myOrdersList"></div>
    <div class="bottom-nav">
      <button class="nav-item" onclick="showPage('home')"><span class="nav-icon">🏠</span>首页</button>
      <button class="nav-item" onclick="showPage('orders')"><span class="nav-icon">📋</span>订单</button>
      <button class="nav-item" onclick="showPage('admin-login')"><span class="nav-icon">⚙️</span>管理</button>
    </div>
  </div>

  <!-- ==================== ADMIN LOGIN ==================== -->
  <div class="page" id="page-admin-login">
    <a class="back" href="#" onclick="showPage('home')">← 返回</a>
    <div class="order-card"><h3>管理后台</h3></div>
    <div class="form-group">
      <label>管理员密码</label>
      <input type="password" id="adminPassword" placeholder="请输入密码">
    </div>
    <button class="btn btn-primary" onclick="adminLogin()">登录</button>
  </div>

  <!-- ==================== ADMIN PANEL ==================== -->
  <div class="page" id="page-admin">
    <a class="back" href="#" onclick="showPage('home')">← 退出</a>
    <div class="order-card"><h3>🔧 管理后台</h3></div>
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;">
      <button class="btn btn-sm btn-primary" onclick="adminTab='orders';renderAdmin();">订单</button>
      <button class="btn btn-sm btn-outline" onclick="adminTab='prices';renderAdmin();">价格</button>
      <button class="btn btn-sm btn-outline" onclick="adminTab='qrcode';renderAdmin();">收款码</button>
    </div>
    <div id="adminContent"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

  { id:"22", name:"高校考试平台-全包", desc:"包视频+测验+考试，1:1跑视频", logo:"🏢", bg:"#5a6fa5", price:25.9, cat:"other", tag:"", tagText:"", platform:"高校考试平台", checkItems:["全包（视频+测验+考试）","仅视频","仅考试"] },
  { id:"23", name:"思纽教育-全包", desc:"包视频+作业+直播，支持32个站点", logo:"🎯", bg:"#8a4a5e", price:16.9, cat:"other", tag:"", tagText:"", platform:"思纽教育", checkItems:["全包（除考试）","仅考试"] },
  { id:"24", name:"出头科技-单考试", desc:"包考试，支持superchutou.com全部机构", logo:"💻", bg:"#6e4a8a", price:6.9, cat:"other", tag:"", tagText:"", platform:"出头科技", checkItems:["仅考试","全包"] },
];

const ADMIN_PWD = "admin888";
const STORAGE_KEY = "ch_v5";

// ═══════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════
function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e) { return {}; }
}
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function getCourses() { const d = loadData(); return d.prices || DEFAULT_COURSES; }
function getOrders() { const d = loadData(); return d.orders || []; }
function getUserQR() { const d = loadData(); return d.paymentQR || ""; }

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
let activeCat = "all";
let adminTab = "orders";
let selectedCheckItems = {};

function showPage(name, data) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  const page = document.getElementById("page-" + name);
  if (page) page.classList.add("active");
  window._pageData = data;
  if (name === "home") renderCourses();
  if (name === "order") renderOrder();
  if (name === "course-select") renderCourseSelect();
  if (name === "orders") renderMyOrders();
  if (name === "admin") renderAdmin();
  window.scrollTo(0, 0);
}

// ═══════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════
function renderCourses() {
  const courses = getCourses();
  const kw = (document.getElementById("searchInput")?.value || "").toLowerCase();
  let list = courses;
  if (activeCat !== "all") list = list.filter(c => c.cat === activeCat);
  if (kw) list = list.filter(c => c.name.toLowerCase().includes(kw) || c.desc.toLowerCase().includes(kw) || c.platform.toLowerCase().includes(kw));

  document.getElementById("courseGrid").innerHTML = list.map(c => `
    <a class="course-card" href="javascript:void(0)" onclick="showPage('order', ${JSON.stringify(c).replace(/"/g, '&quot;').replace(/'/g, '&#39;')})">
      <div class="logo" style="background:${c.bg}">${c.logo}</div>
      <div class="info">
        <div class="name">${c.name} ${c.tag ? '<span class="tag '+c.tag+'">'+c.tagText+'</span>' : ''}</div>
        <div class="desc">${c.desc}</div>
      </div>
      <div class="right">
        <div class="price"><span class="u">¥</span>${c.price.toFixed(1)}</div>
      </div>
      <span class="arrow">›</span>
    </a>
  `).join("");
}

function filterCat(cat, btn) {
  activeCat = cat;
  document.querySelectorAll("#catBar .cat").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderCourses();
}

// ═══════════════════════════════════════════
// ORDER STEP 1
// ═══════════════════════════════════════════
function renderOrder() {
  const c = window._pageData;
  if (!c) return;
  document.getElementById("orderCourseInfo").innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:42px;height:42px;border-radius:10px;background:${c.bg};display:flex;align-items:center;justify-content:center;font-size:20px;">${c.logo}</div>
      <div>
        <h3>${c.name}</h3>
        <p style="color:var(--sub);font-size:11px;">${c.platform}平台 · ¥${c.price.toFixed(1)}/单</p>
      </div>
    </div>
  `;
  // Reset fields
  document.getElementById("orderSchool").value = "";
  document.getElementById("orderAccount").value = "";
  document.getElementById("orderPassword").value = "";
}

// ═══════════════════════════════════════════
// ORDER STEP 2: COURSE SELECT
// ═══════════════════════════════════════════
function goToCourseSelect() {
  const school = document.getElementById("orderSchool").value.trim();
  const account = document.getElementById("orderAccount").value.trim();
  const password = document.getElementById("orderPassword").value.trim();
  if (!school || !account || !password) { toast("请填写完整信息"); return; }
  // Store in page data
  window._pageData._school = school;
  window._pageData._account = account;
  window._pageData._password = password;
  showPage("course-select", window._pageData);
}

function renderCourseSelect() {
  const c = window._pageData;
  if (!c) return;
  selectedCheckItems = {};
  const items = c.checkItems || [c.platform + "全包"];
  document.getElementById("courseChecklist").innerHTML = items.map((item, i) => `
    <div class="check-item" id="checkitem_${i}" onclick="toggleCheck(${i})">
      <input type="checkbox" id="check_${i}" onchange="toggleCheck(${i})">
      <div class="ci">
        <div class="cn">${item}</div>
        <div class="cd">${c.platform}平台 · 此项 ¥${c.price.toFixed(1)}</div>
      </div>
    </div>
  `).join("");
  updateTotal();
  const qr = getUserQR();
  const qrImg = document.getElementById("paymentQR");
  if (qr) { qrImg.src = qr; qrImg.style.display = ""; }
  else { qrImg.style.display = "none"; }
  document.getElementById("orderScreenshot").value = "";
}

function toggleCheck(i) {
  const cb = document.getElementById("check_" + i);
  cb.checked = !cb.checked;
  const el = document.getElementById("checkitem_" + i);
  if (cb.checked) { el.classList.add("checked"); selectedCheckItems[i] = true; }
  else { el.classList.remove("checked"); delete selectedCheckItems[i]; }
  updateTotal();
}

function updateTotal() {
  const c = window._pageData;
  const count = Object.keys(selectedCheckItems).length || 1;
  const total = count * (c ? c.price : 0);
  document.getElementById("orderTotalPrice").textContent = "¥" + total.toFixed(1) + "（" + count + "项）";
}

function selectAll() {
  const c = window._pageData;
  if (!c) return;
  const items = c.checkItems || [];
  for (let i = 0; i < items.length; i++) {
    selectedCheckItems[i] = true;
    const cb = document.getElementById("check_" + i);
    const el = document.getElementById("checkitem_" + i);
    if (cb) cb.checked = true;
    if (el) el.classList.add("checked");
  }
  updateTotal();
}

function deselectAll() {
  const c = window._pageData;
  if (!c) return;
  const items = c.checkItems || [];
  for (let i = 0; i < items.length; i++) {
    delete selectedCheckItems[i];
    const cb = document.getElementById("check_" + i);
    const el = document.getElementById("checkitem_" + i);
    if (cb) cb.checked = false;
    if (el) el.classList.remove("checked");
  }
  updateTotal();
}

// ═══════════════════════════════════════════
// SUBMIT ORDER
// ═══════════════════════════════════════════
function submitFullOrder() {
  const c = window._pageData;
  if (!c) return;
  if (Object.keys(selectedCheckItems).length === 0) { toast("请至少选择一项课程"); return; }

  const items = c.checkItems || [c.platform + "全包"];
  const selected = Object.keys(selectedCheckItems).map(i => items[parseInt(i)]);
  const count = selected.length;
  const total = count * c.price;
  const screenshotFile = document.getElementById("orderScreenshot").files[0];

  const order = {
    id: Date.now().toString(36),
    course: c.name,
    courseId: c.id,
    platform: c.platform,
    price: c.price,
    count,
    total,
    school: c._school,
    account: c._account,
    password: c._password,
    selectedCourses: selected,
    status: "pending",
    createdAt: new Date().toLocaleString(),
  };

  const data = loadData();
  const orders = data.orders || [];

  function finalize(orderData) {
    orders.unshift(orderData);
    data.orders = orders;
    saveData(data);
    // Copy order info to clipboard for admin
    const info = `【新订单】${orderData.course}\n平台:${orderData.platform}\n学校:${orderData.school}\n账号:${orderData.account}\n密码:${orderData.password}\n已选课程:${orderData.selectedCourses.join('、')}\n数量:${orderData.count}项 · 金额:¥${orderData.total.toFixed(1)}`;
    copyToClipboard(info);
    toast("订单提交成功！信息已复制");
    setTimeout(() => showPage("home"), 2000);
  }

  if (screenshotFile) {
    const reader = new FileReader();
    reader.onload = function(e) { order.screenshot = e.target.result; finalize(order); };
    reader.readAsDataURL(screenshotFile);
  } else {
    finalize(order);
  }
}

// ═══════════════════════════════════════════
// MY ORDERS
// ═══════════════════════════════════════════
function renderMyOrders() {
  const orders = getOrders();
  const div = document.getElementById("myOrdersList");
  if (orders.length === 0) {
    div.innerHTML = '<p style="color:var(--sub);text-align:center;padding:30px;">暂无订单</p>';
    return;
  }
  div.innerHTML = orders.slice(0, 30).map(o => `
    <div class="order-item">
      <div><b>${o.course}</b> <span class="status ${o.status}">${o.status==="pending"?"处理中":"已完成"}</span></div>
      <div style="font-size:12px;margin-top:2px;">${o.school} | ${o.account} | ${o.count||1}项 ¥${(o.total||o.price).toFixed(1)}</div>
      ${o.selectedCourses ? '<div style="font-size:11px;color:var(--sub);">课程:'+o.selectedCourses.join('、')+'</div>' : ''}
      <div class="meta">${o.createdAt}</div>
    </div>
  `).join("");
}

// ═══════════════════════════════════════════
// ADMIN
// ═══════════════════════════════════════════
function adminLogin() {
  if (document.getElementById("adminPassword").value === ADMIN_PWD) { showPage("admin"); toast("登录成功"); }
  else { toast("密码错误"); }
}

function renderAdmin() {
  const div = document.getElementById("adminContent");
  const data = loadData();

  if (adminTab === "orders") {
    const orders = getOrders();
    if (orders.length === 0) {
      div.innerHTML = '<p style="color:var(--sub);text-align:center;padding:30px;">暂无订单</p>';
    } else {
      div.innerHTML = orders.map(o => `
        <div class="order-item">
          <div><b>${o.course}</b> - ¥${(o.total||o.price).toFixed(1)} <span class="status ${o.status}">${o.status==="pending"?"处理中":"已完成"}</span></div>
          <div style="margin-top:3px;font-size:12px;">平台:${o.platform||'--'}｜学校:${o.school}｜账号:${o.account}｜密码:${o.password}</div>
          ${o.selectedCourses ? '<div style="font-size:12px;color:var(--green);">勾选课程:'+o.selectedCourses.join('、')+'</div>' : ''}
          <div class="meta">${o.createdAt}｜${o.count||1}项</div>
          ${o.screenshot ? `<img src="${o.screenshot}" style="max-width:100px;margin-top:4px;border-radius:6px;">` : ""}
          <div style="margin-top:6px;display:flex;gap:6px;">
            <button class="btn btn-sm btn-green" onclick="kxOpen('${o.id}')">跳转kx下单</button>
            ${o.status === "pending" ? `<button class="btn btn-sm btn-primary" onclick="markDone('${o.id}')">标记完成</button>` : ""}
          </div>
        </div>
      `).join("");
    }
  }

  if (adminTab === "prices") {
    const courses = getCourses();
    div.innerHTML = courses.map((c, i) => `
      <div class="order-item">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:11px;"><b>${c.logo} ${c.name}</b></span>
          <div class="inline-row">
            <span style="font-size:11px;color:var(--sub);">¥</span>
            <input type="number" id="price_${i}" value="${c.price}" style="width:65px;padding:5px;border-radius:6px;border:1px solid #444;background:var(--card);color:var(--text);text-align:center;" step="0.1">
            <button class="btn btn-sm btn-green" onclick="updatePrice(${i})">保存</button>
          </div>
        </div>
      </div>
    `).join("") + '<p style="color:var(--sub);font-size:10px;margin-top:6px;">价格修改仅当前浏览器生效，永久修改需改代码</p>';
  }

  if (adminTab === "qrcode") {
    const qr = getUserQR();
    div.innerHTML = `
      <p style="font-size:13px;color:var(--sub);margin-bottom:8px;">上传收款码（微信/支付宝），客户下单时显示</p>
      ${qr ? `<img src="${qr}" style="max-width:180px;border-radius:10px;margin-bottom:8px;display:block;">` : "<p style='color:var(--sub);'>未设置</p>"}
      <input type="file" id="qrcodeFile" accept="image/*" style="margin-bottom:8px;">
      <button class="btn btn-primary" onclick="uploadQR()">上传收款码</button>
    `;
  }
}

function markDone(id) {
  const data = loadData();
  const orders = data.orders || [];
  const o = orders.find(x => x.id === id);
  if (o) { o.status = "done"; data.orders = orders; saveData(data); renderAdmin(); toast("已标记"); }
}

function updatePrice(i) {
  const val = parseFloat(document.getElementById("price_" + i).value);
  if (isNaN(val) || val < 0) { toast("无效"); return; }
  const data = loadData();
  if (!data.prices) data.prices = [...DEFAULT_COURSES];
  data.prices[i].price = val;
  saveData(data);
  toast("价格已更新");
}

function uploadQR() {
  const file = document.getElementById("qrcodeFile").files[0];
  if (!file) { toast("请选择图片"); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    const data = loadData();
    data.paymentQR = e.target.result;
    saveData(data);
    toast("收款码已更新");
    renderAdmin();
  };
  reader.readAsDataURL(file);
}

// ═══════════════════════════════════════════
// KX PLATFORM BRIDGE
// ═══════════════════════════════════════════
function kxOpen(orderId) {
  const data = loadData();
  const orders = data.orders || [];
  const o = orders.find(x => x.id === orderId);
  if (!o) return;
  // Open kx platform in new tab and copy order info
  const info = `学校:${o.school}\n账号:${o.account}\n密码:${o.password}\n需要:${(o.selectedCourses||['全包']).join('、')}`;
  copyToClipboard(info);
  window.open("https://kx.nopoliceman.help/add2", "_blank");
  toast("已复制订单信息，在kx页面粘贴使用");
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove("show"), 2500);
}

function copyToClipboard(text) {
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed"; ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  } catch(e) {}
}

renderCourses();
</script>
