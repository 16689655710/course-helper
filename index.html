<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>网课代刷平台</title>
<style>
  :root {
    --bg: #0f0f1a; --card: #1a1a2e; --accent: #6c63ff; --accent2: #ff6584;
    --text: #e0e0e0; --sub: #999; --gold: #ffb800; --green: #4ade80; --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex; justify-content: center; padding: 16px;
  }
  .app { width: 100%; max-width: 460px; min-height: 100vh; }
  .page { display: none; }
  .page.active { display: block; }

  .header { text-align: center; padding: 24px 16px; }
  .header .icon { width: 52px; height: 52px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 14px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 26px; }
  .header h1 { font-size: 19px; font-weight: 700; }
  .header p { font-size: 12px; color: var(--sub); margin-top: 4px; }

  .stats { display: flex; gap: 8px; margin-bottom: 16px; }
  .stat { flex: 1; background: var(--card); border-radius: 10px; padding: 12px 8px; text-align: center; }
  .stat .num { font-size: 20px; font-weight: 700; color: var(--accent); }
  .stat .label { font-size: 10px; color: var(--sub); margin-top: 2px; }

  .search { background: var(--card); border-radius: 10px; padding: 10px 12px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .search input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 14px; }
  .search input::placeholder { color: var(--sub); }

  .cats { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 2px; }
  .cat { padding: 6px 14px; border-radius: 18px; font-size: 12px; white-space: nowrap; background: var(--card); color: var(--sub); cursor: pointer; border: none; transition: .2s; font-family: inherit; }
  .cat.active { background: var(--accent); color: #fff; }

  .course-grid { display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
  .course-card {
    background: var(--card); border-radius: 12px; padding: 14px; cursor: pointer;
    transition: .15s; text-decoration: none; color: inherit; display: flex;
    align-items: flex-start; gap: 12px; position: relative;
  }
  .course-card:active { transform: scale(0.98); background: #252545; }
  .course-card .logo { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .course-card .info { flex: 1; min-width: 0; }
  .course-card .name { font-size: 14px; font-weight: 600; }
  .course-card .desc { font-size: 11px; color: var(--sub); margin-top: 3px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .course-card .right { text-align: right; flex-shrink: 0; }
  .course-card .price { font-size: 19px; font-weight: 800; color: var(--gold); white-space: nowrap; }
  .course-card .price .u { font-size: 11px; font-weight: 400; }
  .course-card .tag { font-size: 10px; padding: 2px 6px; border-radius: 5px; background: rgba(255,101,132,.2); color: var(--accent2); display: inline-block; margin-top: 3px; }
  .course-card .tag.hot { background: rgba(245,158,11,.2); color: #f59e0b; }
  .course-card .tag.fast { background: rgba(74,222,128,.15); color: var(--green); }
  .course-card .orders { font-size: 10px; color: var(--sub); margin-top: 2px; }
  .arrow-right { color: var(--sub); font-size: 16px; align-self: center; flex-shrink: 0; }

  .hidden { display: none !important; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 460px;
    background: var(--card); border-top: 1px solid #222;
    display: flex; justify-content: space-around; padding: 10px 0 14px;
    z-index: 100;
  }
  .bottom-nav .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-size: 10px; color: var(--sub); cursor: pointer; text-decoration: none;
    background: none; border: none; font-family: inherit;
  }
  .bottom-nav .nav-item .nav-icon { font-size: 20px; }

  /* ORDER PAGE */
  .back { color: var(--accent); font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; margin-bottom: 12px; }
  .order-card { background: var(--card); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
  .order-card h3 { font-size: 16px; margin-bottom: 4px; }
  .order-card .price-big { font-size: 28px; font-weight: 800; color: var(--gold); }

  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 13px; color: var(--sub); margin-bottom: 6px; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #2a2a40;
    background: var(--card); color: var(--text); font-size: 14px; outline: none;
    font-family: inherit; resize: vertical;
  }
  .form-group select { appearance: none; cursor: pointer; }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }

  .qr-section { text-align: center; margin: 16px 0; }
  .qr-section img { width: 180px; height: 180px; border-radius: 12px; border: 2px dashed #333; }
  .qr-section p { font-size: 12px; color: var(--sub); margin-top: 6px; }

  .btn {
    width: 100%; padding: 14px; border-radius: 10px; border: none; font-size: 15px;
    font-weight: 600; cursor: pointer; transition: .2s; color: #fff; font-family: inherit;
  }
  .btn-primary { background: var(--accent); }
  .btn-primary:active { background: #5b52e0; }
  .btn-gold { background: linear-gradient(135deg, #f59e0b, #e67e00); }
  .btn-green { background: var(--green); color: #000; }
  .btn-red { background: var(--red); }
  .btn-outline { background: none; border: 1px solid var(--accent); color: var(--accent); }
  .btn-sm { padding: 8px 16px; font-size: 13px; width: auto; }

  /* ADMIN */
  .order-item { background: var(--card); border-radius: 10px; padding: 12px; margin-bottom: 8px; font-size: 13px; }
  .order-item .meta { color: var(--sub); font-size: 11px; margin-top: 4px; }
  .status { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; margin-left: 6px; }
  .status.pending { background: rgba(245,158,11,.2); color: #f59e0b; }
  .status.done { background: rgba(74,222,128,.2); color: var(--green); }
  .inline-row { display: flex; gap: 8px; align-items: center; }
  .inline-row input { flex: 1; }

  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 10px 24px; border-radius: 20px;
    font-size: 13px; z-index: 999; opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  .toast.show { opacity: 1; }
  .footer { text-align: center; padding: 20px 20px 90px; color: var(--sub); font-size: 11px; }
  .notice { background: rgba(255,184,0,.08); border-left: 3px solid var(--gold); border-radius: 8px; padding: 10px 12px; margin: 12px 0; font-size: 12px; color: var(--gold); }
</style>
</head>
<body>

<div class="app">

  <!-- ==================== HOME PAGE ==================== -->
  <div class="page active" id="page-home">
    <div class="header">
      <div class="icon">📚</div>

      <input type="password" id="orderPassword" placeholder="登录密码">
    </div>
    <div class="form-group">
      <label>备注（选填）</label>
      <textarea id="orderNote" rows="2" placeholder="如：只刷视频不考试、需要慢刷..."></textarea>
    </div>
    <div class="qr-section">

    </div>
    <div class="form-group">
      <label>支付截图（选填，审核更快）</label>
      <input type="file" id="orderScreenshot" accept="image/*" style="padding:10px;">
    </div>
    <div class="notice">

    </div>
    <button class="btn btn-gold" onclick="submitOrder()">确认支付并提交</button>
  </div>

  <!-- ==================== MY ORDERS ==================== -->
  <div class="page" id="page-orders">
    <a class="back" href="#" onclick="showPage('home')">← 返回</a>
    <div class="order-card"><h3>我的订单</h3></div>
    <div id="myOrdersList"></div>
    <div class="bottom-nav">

      <button class="nav-item active" onclick="showPage('orders')"><span class="nav-icon">📋</span>我的订单</button>
      <button class="nav-item" onclick="showPage('admin-login')"><span class="nav-icon">⚙️</span>管理</button>
    </div>
  </div>

  <!-- ==================== ADMIN LOGIN ==================== -->
  <div class="page" id="page-admin-login">
    <a class="back" href="#" onclick="showPage('home')">← 返回</a>

    <div class="form-group">

    </div>
    <button class="btn btn-primary" onclick="adminLogin()">登录</button>
  </div>

  <!-- ==================== ADMIN PANEL ==================== -->

    <a class="back" href="#" onclick="showPage('home')">← 退出管理</a>
    <div class="order-card"><h3>🔧 管理后台</h3></div>

      <button class="btn btn-sm btn-outline" onclick="adminTab='qrcode';renderAdmin();">收款码设置</button>
    </div>
    <div id="adminContent"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

  { id:"28", name:"思纽教育-单考试", desc:"仅考试，有人脸识别的考试请勿下单（如喀什大学），支持32个站点", logo:"🎯", bg:"#8a4a5e", price:9.9, cat:"other", tag:"", tagText:"", orders:4120 },
];

const ADMIN_PWD = "admin888";
const STORAGE_KEY = "course_helper_v4";

// ═══════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════
function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e) { return {}; }
}
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function getCourses() { const d = loadData(); return d.prices || DEFAULT_COURSES; }
function getOrders() { const d = loadData(); return d.orders || []; }
function getUserQR() { const d = loadData(); return d.paymentQR || ""; }

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
let activeCat = "all";
let adminTab = "orders";

function showPage(name, data) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  const page = document.getElementById("page-" + name);
  if (page) page.classList.add("active");
  window._pageData = data;
  if (name === "home") renderCourses();
  if (name === "order") renderOrder();
  if (name === "orders") renderMyOrders();
  if (name === "admin") renderAdmin();
  window.scrollTo(0, 0);
}

// ═══════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════
function renderCourses() {
  const courses = getCourses();
  const kw = (document.getElementById("searchInput")?.value || "").toLowerCase();
  let list = courses;
  if (activeCat !== "all") list = list.filter(c => c.cat === activeCat);
  if (kw) list = list.filter(c => c.name.toLowerCase().includes(kw) || c.desc.toLowerCase().includes(kw));

  document.getElementById("courseGrid").innerHTML = list.map(c => `
    <a class="course-card" href="javascript:void(0)" onclick="showPage('order', ${JSON.stringify(c).replace(/"/g, '&quot;').replace(/'/g, '&#39;')})">
      <div class="logo" style="background:${c.bg}">${c.logo}</div>
      <div class="info">
        <div class="name">${c.name} ${c.tag ? '<span class="tag '+c.tag+'">'+c.tagText+'</span>' : ''}</div>
        <div class="desc">${c.desc}</div>
        <div class="orders">已处理 ${(c.orders||0).toLocaleString()} 单</div>
      </div>
      <div class="right">
        <div class="price"><span class="u">¥</span>${c.price.toFixed(1)}</div>
      </div>
      <span class="arrow-right">›</span>
    </a>
  `).join("");
}

function filterCat(cat, btn) {
  activeCat = cat;
  document.querySelectorAll("#catBar .cat").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderCourses();
}

// ═══════════════════════════════════════════
// ORDER
// ═══════════════════════════════════════════
function renderOrder() {
  const c = window._pageData;
  if (!c) return;
  document.getElementById("orderCourseInfo").innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:44px;height:44px;border-radius:10px;background:${c.bg};display:flex;align-items:center;justify-content:center;font-size:20px;">${c.logo}</div>
      <div><h3>${c.name}</h3><p style="color:var(--sub);font-size:12px;">${c.desc.slice(0,60)}...</p></div>
    </div>
    <div style="text-align:center;margin-top:12px;"><span class="price-big"><span class="u">¥</span>${c.price.toFixed(1)}</span></div>
  `;
  document.getElementById("orderPrice").textContent = "¥" + c.price.toFixed(1);
  const qr = getUserQR();
  const qrImg = document.getElementById("paymentQR");
  if (qr) { qrImg.src = qr; qrImg.style.display = ""; }
  else { qrImg.style.display = "none"; }
}

function submitOrder() {
  const c = window._pageData;
  const school = document.getElementById("orderSchool").value.trim();
  const account = document.getElementById("orderAccount").value.trim();
  const password = document.getElementById("orderPassword").value.trim();
  const note = document.getElementById("orderNote").value.trim();
  const screenshotFile = document.getElementById("orderScreenshot").files[0];

  if (!school) { toast("请填写学校/机构名称"); return; }
  if (!account || !password) { toast("请填写账号和密码"); return; }

  const data = loadData();
  const orders = data.orders || [];
  const order = {
    id: Date.now().toString(36),
    course: c.name, courseId: c.id, price: c.price,
    school, account, password, note,
    status: "pending",
    createdAt: new Date().toLocaleString(),
  };

  if (screenshotFile) {
    const reader = new FileReader();
    reader.onload = function(e) {
      order.screenshot = e.target.result;
      orders.unshift(order);
      data.orders = orders;
      saveData(data);
      copyToClipboard(`【新订单】${c.name}\n学校:${school}\n账号:${account}\n密码:${password}\n备注:${note}\n金额:¥${c.price.toFixed(1)}`);
      toast("订单提交成功！信息已复制，可粘贴发送给客服确认");
      setTimeout(() => showPage("home"), 2000);
    };
    reader.readAsDataURL(screenshotFile);
  } else {
    orders.unshift(order);
    data.orders = orders;
    saveData(data);
    copyToClipboard(`【新订单】${c.name}\n学校:${school}\n账号:${account}\n密码:${password}\n备注:${note}\n金额:¥${c.price.toFixed(1)}`);
    toast("订单提交成功！信息已复制到剪贴板");
    setTimeout(() => showPage("home"), 2000);
  }
}

// ═══════════════════════════════════════════
// MY ORDERS
// ═══════════════════════════════════════════
function renderMyOrders() {
  const orders = getOrders();
  const div = document.getElementById("myOrdersList");
  if (orders.length === 0) {
    div.innerHTML = '<p style="color:var(--sub);text-align:center;padding:30px;">暂无订单</p>';
    return;
  }
  div.innerHTML = orders.slice(0, 30).map(o => `
    <div class="order-item">
      <div><b>${o.course}</b> <span class="status ${o.status}">${o.status==="pending"?"处理中":"已完成"}</span></div>
      <div style="margin-top:2px;font-size:12px;">${o.school} | 账号:${o.account}</div>
      <div class="meta">¥${o.price.toFixed(1)} · ${o.createdAt}</div>
    </div>
  `).join("");
}

// ═══════════════════════════════════════════
// ADMIN
// ═══════════════════════════════════════════
function adminLogin() {
  const pwd = document.getElementById("adminPassword").value;
  if (pwd === ADMIN_PWD) { showPage("admin"); toast("登录成功"); }
  else { toast("密码错误"); }
}

function renderAdmin() {
  const div = document.getElementById("adminContent");
  const data = loadData();

  if (adminTab === "orders") {
    const orders = getOrders();
    if (orders.length === 0) {
      div.innerHTML = '<p style="color:var(--sub);text-align:center;padding:30px;">暂无订单</p>';
    } else {
      div.innerHTML = orders.map(o => `
        <div class="order-item">
          <div><b>${o.course}</b> - ¥${o.price.toFixed(1)} <span class="status ${o.status}">${o.status==="pending"?"处理中":"已完成"}</span></div>
          <div style="margin-top:4px;">学校：${o.school}｜账号：${o.account}｜密码：${o.password}${o.note ? '｜备注：'+o.note : ''}</div>
          <div class="meta">${o.createdAt}</div>
          ${o.screenshot ? `<img src="${o.screenshot}" style="max-width:120px;margin-top:4px;border-radius:6px;">` : ""}
          ${o.status === "pending" ? `<button class="btn btn-sm btn-green" style="margin-top:4px;" onclick="markDone('${o.id}')">标记完成</button>` : ""}
        </div>
      `).join("");
    }
  }

  if (adminTab === "prices") {
    const courses = getCourses();
    div.innerHTML = courses.map((c, i) => `
      <div class="order-item">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:12px;"><b>${c.logo} ${c.name}</b></span>
          <div class="inline-row">
            <span style="font-size:12px;color:var(--sub);">¥</span>
            <input type="number" id="price_${i}" value="${c.price}" style="width:70px;padding:6px;border-radius:6px;border:1px solid #444;background:var(--card);color:var(--text);text-align:center;" step="0.1">
            <button class="btn btn-sm btn-green" onclick="updatePrice(${i})">保存</button>
          </div>
        </div>
      </div>
    `).join("") + '<p style="color:var(--sub);font-size:11px;margin-top:8px;">价格修改仅当前浏览器生效，永久修改需改代码中的DEFAULT_COURSES</p>';
  }

  if (adminTab === "qrcode") {
    const qr = getUserQR();
    div.innerHTML = `
      <p style="font-size:13px;color:var(--sub);margin-bottom:8px;">上传你的微信/支付宝收款码，用户下单时会看到</p>
      ${qr ? `<img src="${qr}" style="max-width:200px;border-radius:12px;margin-bottom:10px;display:block;">` : "<p style='color:var(--sub);'>尚未设置收款码</p>"}
      <input type="file" id="qrcodeFile" accept="image/*" style="margin-bottom:10px;">
      <button class="btn btn-primary" onclick="uploadQR()">上传收款码</button>
    `;
  }
}

function markDone(id) {
  const data = loadData();
  const orders = data.orders || [];
  const o = orders.find(x => x.id === id);
  if (o) { o.status = "done"; data.orders = orders; saveData(data); renderAdmin(); toast("已标记完成"); }
}

function updatePrice(i) {
  const val = parseFloat(document.getElementById("price_" + i).value);
  if (isNaN(val) || val < 0) { toast("价格无效"); return; }
  const data = loadData();
  if (!data.prices) data.prices = [...DEFAULT_COURSES];
  data.prices[i].price = val;
  saveData(data);
  toast("价格已更新，刷新首页生效");
}

function uploadQR() {
  const file = document.getElementById("qrcodeFile").files[0];
  if (!file) { toast("请选择图片"); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    const data = loadData();
    data.paymentQR = e.target.result;
    saveData(data);
    toast("收款码已更新");
    renderAdmin();
  };
  reader.readAsDataURL(file);
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove("show"), 2500);
}

function copyToClipboard(text) {
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed"; ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  } catch(e) {}
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderCourses();
</script>
</body>
</html>
