<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>网课代刷平台</title>
<style>
  :root{--bg:#0f0f1a;--card:#1a1a2e;--accent:#6c63ff;--accent2:#ff6584;--text:#e0e0e0;--sub:#999;--gold:#ffb800;--green:#4ade80;--red:#ef4444}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:16px}
  .app{width:100%;max-width:460px;min-height:100vh}
  .page{display:none}
  .page.active{display:block}
  .header{text-align:center;padding:18px 14px}
  .header .icon{width:46px;height:46px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:22px}
  .header h1{font-size:17px;font-weight:700}
  .header p{font-size:11px;color:var(--sub);margin-top:2px}
  .course-grid{display:flex;flex-direction:column;gap:10px;padding-bottom:80px}
  .course-card{background:var(--card);border-radius:12px;padding:14px 16px;cursor:pointer;transition:.15s;text-decoration:none;color:inherit;display:flex;align-items:flex-start;gap:12px}
  .course-card:active{transform:scale(.98);background:#252545}
  .course-card .logo{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .course-card .info{flex:1;min-width:0}
  .course-card .name{font-size:14px;font-weight:600}
  .course-card .desc{font-size:11px;color:var(--sub);margin-top:3px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
  .course-card .right{text-align:right;flex-shrink:0}
  .course-card .price{font-size:18px;font-weight:800;color:var(--gold);white-space:nowrap}
  .course-card .price .u{font-size:11px;font-weight:400}
  .course-card .tag{font-size:9px;padding:1px 6px;border-radius:4px;display:inline-block;margin-top:3px}
  .tag.hot{background:rgba(245,158,11,.15);color:#f59e0b}
  .tag.fast{background:rgba(74,222,128,.12);color:var(--green)}
  .tag.rec{background:rgba(108,99,255,.15);color:var(--accent)}
  .arrow{color:var(--sub);font-size:16px;align-self:center}
  .back{color:var(--accent);font-size:13px;cursor:pointer;text-decoration:none;display:inline-block;margin-bottom:10px}
  .card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px}
  .card h3{font-size:15px}
  .form-group{margin-bottom:10px}
  .form-group label{display:block;font-size:12px;color:var(--sub);margin-bottom:4px}
  .form-group input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #2a2a40;background:var(--card);color:var(--text);font-size:14px;outline:none;font-family:inherit}
  .form-group input:focus{border-color:var(--accent)}
  .course-checklist{max-height:350px;overflow-y:auto;margin:10px 0}
  .check-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:var(--card);border-radius:8px;margin-bottom:6px;cursor:pointer;border:2px solid transparent}
  .check-item.checked{border-color:var(--accent);background:#1e1e3a}
  .check-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);margin-top:2px;flex-shrink:0}
  .check-item .cn{font-size:13px;font-weight:600;word-break:break-all}
  .qr-section{text-align:center;margin:12px 0}
  .qr-section img{width:150px;height:150px;border-radius:12px;border:2px dashed #333}
  .btn{width:100%;padding:12px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;color:#fff;font-family:inherit}
  .btn-primary{background:var(--accent)}
  .btn-gold{background:linear-gradient(135deg,#f59e0b,#e67e00)}
  .btn-green{background:var(--green);color:#000}
  .btn-sm{padding:6px 12px;font-size:11px;width:auto}
  .btn-outline{background:none;border:1px solid var(--accent);color:var(--accent)}
  .order-item{background:var(--card);border-radius:10px;padding:10px;margin-bottom:6px;font-size:12px}
  .order-item .meta{color:var(--sub);font-size:10px;margin-top:3px}
  .status{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;margin-left:4px}
  .status.pending{background:rgba(245,158,11,.2);color:#f59e0b}
  .status.done{background:rgba(74,222,128,.2);color:var(--green)}
  .inline-row{display:flex;gap:6px;align-items:center}
  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;background:var(--card);border-top:1px solid #222;display:flex;justify-content:space-around;padding:8px 0 12px;z-index:100}
  .bottom-nav .nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;color:var(--sub);cursor:pointer;background:none;border:none;font-family:inherit}
  .bottom-nav .nav-item .nav-icon{font-size:17px}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 20px;border-radius:16px;font-size:12px;z-index:999;opacity:0;pointer-events:none;transition:opacity .3s}
  .toast.show{opacity:1}
  .footer{text-align:center;padding:14px 14px 80px;color:var(--sub);font-size:10px}
  .notice{background:rgba(255,184,0,.05);border-left:3px solid var(--gold);border-radius:8px;padding:8px 10px;margin:8px 0;font-size:11px;color:var(--gold)}
  .err{background:rgba(239,68,68,.08);border-radius:8px;padding:8px 10px;margin:8px 0;font-size:11px;color:var(--red)}
  .loading{text-align:center;padding:20px;color:var(--sub)}
  .spinner{display:inline-block;width:24px;height:24px;border:2px solid #333;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="app">

  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="header"><div class="icon">📚</div><h1>网课代刷平台</h1><p>选脚本 → 填账号密码 → 查课 → 勾选 → 支付 → 完成</p></div>
    <div class="course-grid" id="courseGrid"></div>
    <div class="footer">安全可靠 · 不满意退款<br><a href="#" onclick="SP('admin-login')" style="color:#222;font-size:9px;">管理入口</a></div>
    <div class="bottom-nav">
      <button class="nav-item" onclick="SP('home')"><span class="nav-icon">🏠</span>首页</button>
      <button class="nav-item" onclick="SP('orders')"><span class="nav-icon">📋</span>订单</button>
      <button class="nav-item" onclick="SP('admin-login')"><span class="nav-icon">⚙️</span>管理</button>
    </div>
  </div>

  <!-- ORDER -->
  <div class="page" id="page-order">
    <a class="back" href="#" onclick="SP('home')">← 返回</a>
    <div class="card" id="orderCourseInfo"></div>
    <div class="form-group"><label>平台账号</label><input type="text" id="orderAccount" placeholder="手机号/学号"></div>
    <div class="form-group"><label>平台密码</label><input type="password" id="orderPassword" placeholder="登录密码"></div>

    <div id="checkStatus" class="hidden">
      <div class="loading" id="checkLoading"><div class="spinner"></div><p style="margin-top:8px;">正在查询您的课程，请稍候...</p><p style="font-size:11px;color:var(--sub);">首次查询可能需要30秒左右，请耐心等待</p></div>
      <div id="checkError" class="hidden"></div>
    </div>
    <button class="btn btn-primary" id="btnCheck" onclick="CK()">查询课程</button>

    <div id="paySection" class="hidden">
      <div class="card"><h3>📋 您的课程</h3><p style="color:var(--sub);font-size:11px;">请勾选需要代刷的课程</p></div>
      <div style="margin-bottom:6px;display:flex;gap:6px;"><button class="btn btn-sm btn-outline" onclick="SA()">全选</button><button class="btn btn-sm btn-outline" onclick="DA()">取消</button></div>
      <div class="course-checklist" id="courseChecklist"></div>
      <div class="qr-section"><p style="color:var(--red);margin-bottom:4px;">支付金额</p><img id="paymentQR" src="" alt="收款码" onerror="this.style.display='none'" style="width:150px;height:150px;"><p><b id="orderTotalPrice" style="color:var(--gold);font-size:18px;"></b></p></div>
      <div class="form-group"><label>支付截图</label><input type="file" id="orderScreenshot" accept="image/*" style="padding:8px;"></div>
      <div class="notice">提交后24小时内处理完成，期间请勿登录账号</div>
      <button class="btn btn-gold" onclick="SO()">确认支付并提交</button>
    </div>
  </div>

  <!-- MY ORDERS -->
  <div class="page" id="page-orders">
    <a class="back" href="#" onclick="SP('home')">← 返回</a>
    <div class="card"><h3>我的订单</h3></div><div id="myOrdersList"></div>
    <div class="bottom-nav"><button class="nav-item" onclick="SP('home')"><span class="nav-icon">🏠</span>首页</button><button class="nav-item" onclick="SP('orders')"><span class="nav-icon">📋</span>订单</button><button class="nav-item" onclick="SP('admin-login')"><span class="nav-icon">⚙️</span>管理</button></div>
  </div>

  <!-- ADMIN LOGIN -->
  <div class="page" id="page-admin-login">
    <a class="back" href="#" onclick="SP('home')">← 返回</a>
    <div class="card"><h3>管理后台</h3></div>
    <div class="form-group"><label>管理员密码</label><input type="password" id="adminPassword" placeholder="请输入密码"></div>
    <button class="btn btn-primary" onclick="AL()">登录</button>
  </div>

  <!-- ADMIN -->
  <div class="page" id="page-admin">
    <a class="back" href="#" onclick="SP('home')">← 退出</a>
    <div class="card"><h3>🔧 管理后台</h3></div>
    <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;">
      <button class="btn btn-sm btn-primary" onclick="AT='orders';RA();">订单</button>
      <button class="btn btn-sm btn-outline" onclick="AT='prices';RA();">价格</button>
      <button class="btn btn-sm btn-outline" onclick="AT='qrcode';RA();">收款码</button>
    </div>
    <div id="adminContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const AP="https://every-poets-wear.loca.lt", AK="admin888", SK="ch_v11";

// 课程数据
const DC=[
  {kx:"U校园AI版", name:"PUP-U校园AI版 整本", desc:"客观题作答默认满分，主观题填标准答案，没开放单元开放后自动上号。时长默认教师设置的满分时长，未达满分重刷可增加，满分后重刷不再增加。支持自定义时长分数", logo:"🤖",bg:"#5c3e9e",price:4.51,tag:"rec",tagText:"推荐"},
  {kx:"U校园", name:"PUP-U校园 整本", desc:"作答默认满分，没开放单元开放后自动上号。时长默认教师设置的满分时长，未达满分重刷可增加。支持自定义分数、时长、周期、仅必修等参数", logo:"🏫",bg:"#5c3e9e",price:4.51},
  {kx:"学习通", name:"恐龙学习通", desc:"包课件、测验、作业、讨论、课程内考试、APP考试。24h学习不休息不清进度。测验支持特殊题型：阅读理解、完形填空、听力题、排序题、连线题、共用选项题", logo:"📖",bg:"#2b5f8a",price:2.90,tag:"hot",tagText:"全能"},
  {kx:"智慧树", name:"毛豆-智慧树/知到【慢速】", desc:"全包：视频+章测+平时分+见面课+互动+考试。每天观看30分钟，学习习惯分考试自动完成，结课前72小时内包满进度", logo:"🌳",bg:"#2d8a4e",price:3.90,tag:"rec",tagText:"稳定"},
  {kx:"中国大学MOOC", name:"恐龙中国大学MOOC", desc:"包视频、文档、文本、客观题测验（主观题和附件类型题暂不处理）", logo:"🎓",bg:"#c73e3e",price:1.98},
  {kx:"清华社英语", name:"PUP-清华社英语-整本", desc:"包做题+时长，正确率98%以上，支持闯关模式。录音自动根据性别上传。最高30小时，默认16小时，时长一比一完成。支持自定义时长、周期", logo:"📕",bg:"#8b3e4a",price:6.90},
  {kx:"长江雨课堂", name:"恐龙-长江雨课堂", desc:"包视频、讨论、作业、考试", logo:"📺",bg:"#4a6fa5",price:3.90},
];

let SI={}, CC=[], AT="orders", _serverPrices=null;

function ld(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch(e){return{}}}
function sv(d){localStorage.setItem(SK,JSON.stringify(d))}
function GO(){const d=ld();return d.orders||[]}
function GQ(){const d=ld();return d.paymentQR||""}

// 从服务端获取价格（所有人看到一致价格）
async function loadPrices(){
  try{
    const r=await fetch(`${AP}/api/prices`);
    if(r.ok){_serverPrices=await r.json();}
  }catch(e){}
}
function GC(){
  const courses=DC.map(c=>({...c})); // 深拷贝
  if(_serverPrices){
    courses.forEach(c=>{if(_serverPrices[c.kx]!==undefined)c.price=_serverPrices[c.kx];});
  }
  return courses;
}

function SP(name,data){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  const pg=document.getElementById("page-"+name);
  if(pg)pg.classList.add("active");
  window._pd=data;
  if(name==="home")R();
  if(name==="order")RO();
  if(name==="orders")RMO();
  if(name==="admin")RA();
  window.scrollTo(0,0);
}

function R(){
  const cs=GC();
  document.getElementById("courseGrid").innerHTML=cs.map(c=>`
    <a class="course-card" href="javascript:void(0)" onclick="SP('order',${JSON.stringify(c).replace(/"/g,'&quot;')})">
      <div class="logo" style="background:${c.bg}">${c.logo}</div>
      <div class="info">
        <div class="name">${c.name} ${c.tag?`<span class="tag ${c.tag}">${c.tagText}</span>`:''}</div>
        <div class="desc">${c.desc}</div>
      </div>
      <div class="right"><div class="price"><span class="u">¥</span>${c.price.toFixed(1)}</div></div>
      <span class="arrow">›</span>
    </a>
  `).join("");
}

function RO(){
  const c=window._pd;if(!c)return;
  document.getElementById("orderCourseInfo").innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:42px;height:42px;border-radius:10px;background:${c.bg};display:flex;align-items:center;justify-content:center;font-size:18px;">${c.logo}</div>
      <div><h3>${c.name}</h3><p style="color:var(--sub);font-size:11px;">${c.kx}平台 · ¥${c.price.toFixed(1)}/门</p></div>
    </div>`;
  document.getElementById("orderAccount").value="";document.getElementById("orderPassword").value="";
  document.getElementById("checkStatus").classList.add("hidden");
  document.getElementById("btnCheck").classList.remove("hidden");
  document.getElementById("paySection").classList.add("hidden");
  SI={};CC=[];
  const qr=GQ();const qi=document.getElementById("paymentQR");
  if(qr){qi.src=qr;qi.style.display="";}else{qi.style.display="none";}
}

async function CK(){
  const c=window._pd;if(!c)return;
  const a=document.getElementById("orderAccount").value.trim();
  const p=document.getElementById("orderPassword").value.trim();
  if(!a||!p){T("请填写账号和密码");return;}

  document.getElementById("btnCheck").classList.add("hidden");
  document.getElementById("checkStatus").classList.remove("hidden");
  document.getElementById("checkLoading").classList.remove("hidden");
  document.getElementById("checkError").classList.add("hidden");
  document.getElementById("paySection").classList.add("hidden");

  try{
    const resp=await fetch(`${AP}/api/check-course`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({account:a,password:p,platform:c.kx})
    });
    const d=await resp.json();
    document.getElementById("checkLoading").classList.add("hidden");
    if(d.success && d.courses && d.courses.length>0 && !d.courses[0].includes('未查到')){
      CC=d.courses;RL(d.courses);document.getElementById("paySection").classList.remove("hidden");
    }else{
      document.getElementById("checkError").classList.remove("hidden");
      document.getElementById("checkError").innerHTML=`<div class="err">❌ ${d.error||"未查到课程，请检查账号密码是否正确"}</div>`;
      document.getElementById("btnCheck").classList.remove("hidden");
    }
  }catch(e){
    document.getElementById("checkLoading").classList.add("hidden");
    document.getElementById("checkError").classList.remove("hidden");
    document.getElementById("checkError").innerHTML=`<div class="err">❌ 服务未启动，请运行 python server.py 后重试</div>`;
    document.getElementById("btnCheck").classList.remove("hidden");
  }
}

function RL(courses){
  const div=document.getElementById("courseChecklist");
  div.innerHTML=courses.map((name,i)=>`
    <div class="check-item" id="ci_${i}" onclick="TC(${i})"><input type="checkbox" id="cb_${i}" onchange="TC(${i})"><div class="cn">${name}</div></div>
  `).join("");
  UT();
}
function TC(i){const cb=document.getElementById("cb_"+i);cb.checked=!cb.checked;const el=document.getElementById("ci_"+i);if(cb.checked){el.classList.add("checked");SI[i]=true;}else{el.classList.remove("checked");delete SI[i];}UT();}
function SA(){document.querySelectorAll("#courseChecklist .check-item").forEach((el,i)=>{SI[i]=true;el.classList.add("checked");document.getElementById("cb_"+i).checked=true;});UT();}
function DA(){document.querySelectorAll("#courseChecklist .check-item").forEach((el,i)=>{delete SI[i];el.classList.remove("checked");document.getElementById("cb_"+i).checked=false;});UT();}
function UT(){const c=window._pd;if(!c)return;const cnt=Object.keys(SI).length||1;document.getElementById("orderTotalPrice").textContent=`¥${(cnt*c.price).toFixed(1)}（${cnt}门 × ¥${c.price.toFixed(1)}）`;}

function SO(){
  const c=window._pd;if(!c)return;
  if(Object.keys(SI).length===0){T("请至少勾选一门");return;}
  const a=document.getElementById("orderAccount").value.trim();
  const p=document.getElementById("orderPassword").value.trim();
  const all=document.querySelectorAll("#courseChecklist .cn");
  let sel=[];all.forEach((el,i)=>{if(SI[i])sel.push(el.textContent);});
  const cnt=sel.length;const total=cnt*c.price;
  const file=document.getElementById("orderScreenshot").files[0];
  const order={id:Date.now().toString(36),course:c.name,platform:c.kx,price:c.price,perPrice:c.price,count:cnt,total:cnt*c.price,account:a,password:p,courses:sel,status:"pending",createdAt:new Date().toLocaleString()};
  const data=ld();const orders=data.orders||[];
  function fin(o){orders.unshift(o);data.orders=orders;sv(data);T("订单提交成功！");setTimeout(()=>SP("home"),2000);}
  if(file){const r=new FileReader();r.onload=function(e){order.screenshot=e.target.result;fin(order);};r.readAsDataURL(file);}else{fin(order);}
}

function RMO(){
  const orders=GO();const div=document.getElementById("myOrdersList");
  if(orders.length===0){div.innerHTML='<p style="color:var(--sub);text-align:center;padding:30px;">暂无订单</p>';return;}
  div.innerHTML=orders.slice(0,30).map(o=>`
    <div class="order-item"><div><b>${o.course}</b><span class="status ${o.status}">${o.status==="pending"?"处理中":"已完成"}</span></div>
    <div style="font-size:11px;">${o.account}|${o.count||1}门 ¥${(o.total||0).toFixed(1)}</div>
    <div style="font-size:10px;color:var(--sub)">${(o.courses||[]).join('、')}</div><div class="meta">${o.createdAt}</div></div>
  `).join("");
}

function AL(){if(document.getElementById("adminPassword").value===AK){SP("admin");T("登录成功");}else{T("密码错误");}}
function RA(){
  const div=document.getElementById("adminContent");const data=ld();
  if(AT==="orders"){
    const orders=GO();
    if(orders.length===0){div.innerHTML='<p style="color:var(--sub);text-align:center;padding:30px;">暂无订单</p>';}
    else{div.innerHTML=orders.map(o=>`
      <div class="order-item"><div><b>${o.course}</b>-¥${(o.total||0).toFixed(1)}<span class="status ${o.status}">${o.status==="pending"?"处理中":"已完成"}</span></div>
      <div style="font-size:11px;">账号:${o.account}｜密码:${o.password}</div>
      <div style="font-size:11px;color:var(--green);">课程:${(o.courses||[]).join('、')}</div>
      <div class="meta">${o.createdAt}｜${o.count||1}门</div>
      ${o.screenshot?`<img src="${o.screenshot}" style="max-width:80px;margin-top:3px;border-radius:6px;">`:""}
      ${o.status==="pending"?`<button class="btn btn-sm btn-primary" onclick="MD('${o.id}')">标记完成</button>`:""}
    </div>`).join("");}
  }
  if(AT==="prices"){const cs=GC();div.innerHTML=cs.map((c,i)=>`<div class="order-item"><div style="display:flex;align-items:center;justify-content:space-between;"><span style="font-size:11px;"><b>${c.logo} ${c.name}</b></span><div class="inline-row"><span style="font-size:10px;color:var(--sub);">¥</span><input type="number" id="p_${i}" value="${c.price}" style="width:60px;padding:5px;border-radius:6px;border:1px solid #444;background:var(--card);color:var(--text);text-align:center;" step="0.1"><button class="btn btn-sm btn-green" onclick="UP(${i})">保存</button></div></div></div>`).join("")+'<p style="color:var(--sub);font-size:10px;margin-top:4px;">修改后自动同步到服务端，所有人可见</p>';}
  if(AT==="qrcode"){const qr=GQ();div.innerHTML=`<p style="font-size:12px;color:var(--sub);margin-bottom:6px;">上传收款码</p>${qr?`<img src="${qr}" style="max-width:160px;border-radius:10px;margin-bottom:6px;display:block;">`:"<p style='color:var(--sub);'>未设置</p>"}<input type="file" id="qrFile" accept="image/*" style="margin-bottom:6px;"><button class="btn btn-primary" onclick="UQ()">上传</button>`;}
}
function MD(id){const data=ld();const orders=data.orders||[];const o=orders.find(x=>x.id===id);if(o){o.status="done";data.orders=orders;sv(data);RA();T("已标记");}}
async function UP(i){const v=parseFloat(document.getElementById("p_"+i).value);if(isNaN(v)||v<0){T("无效");return;}const cs=GC();cs[i].price=v;const priceData={};priceData[cs[i].kx]=v;try{await fetch(`${AP}/api/prices`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(priceData)});_serverPrices=cs[i].kx in (_serverPrices||{})?Object.assign(_serverPrices||{},priceData):priceData;T("价格已同步到服务端！");}catch(e){T("同步失败，请检查服务端");}}
function UQ(){const f=document.getElementById("qrFile").files[0];if(!f){T("请选择");return;}const r=new FileReader();r.onload=function(e){const d=ld();d.paymentQR=e.target.result;sv(d);T("已更新");RA();};r.readAsDataURL(f);}
function T(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove("show"),2500);}
loadPrices().then(()=>R());
</script>
</body>
